name: Build Android APK

on:
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        working-directory: ./lizza
        run: npm install

      - name: Build React Web App
        working-directory: ./lizza
        run: npm run build

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Capacitor
        working-directory: ./lizza
        run: npx cap sync android

      - name: Compile Android APK
        working-directory: ./lizza/android
        run: ./gradlew assembleDebug

      - name: Upload APK for Download
        uses: actions/upload-artifact@v3
        with:
          name: Lizza-Field-App
          path: lizza/android/app/build/outputs/apk/debug/app-debug.apk